<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllProGamerz — Dashboard</title>
  <link rel="icon" href="photo.png">
  <link rel="stylesheet" href="styles/dashboard.css">

</head>
<body>

  <header>
    <h1>AP<span>G</span></h1>
    <p id="greeting" style="font-size:14px;color:var(--text-muted);font-weight:400;"></p>
    <button class="btn btn-danger" id="logoutBtn">Sign out</button>
</header>

<div class="nav-bar">
  <a href="#games">Games</a>
  <a href="#challenge">Challenge</a>
  <a href="#prize">Prizes</a>
  <a href="#profile">Profile</a>
  <a href="#request">Request</a>
  <a href="#contact">Contact</a>
  <a href="#admin" id="adminNavLink" style="display:none;">Admin</a>
</div>

<div id="mainWorkspace" class="container" style="display: none;">

  <div id="nameReminder" style="display:none;background:rgba(234,179,8,0.12);border:1px solid rgba(234,179,8,0.3);border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:14px;color:#eab308;">
    Don't forget to add your <strong>First Name</strong> and <strong>Last Name</strong> in your <a href="#profile" style="color:#eab308;font-weight:600;">profile</a>!
  </div>

  <section id="games">
    <iframe src="SubTabs/Games.html"></iframe>
  </section>

  <section id="challenge">
    <iframe src="SubTabs/Challenge.html"></iframe>
  </section>

  <section id="prize">
    <iframe src="SubTabs/Prizes.html"></iframe>
  </section>

  <section id="profile">
    <iframe src="SubTabs/Profile.html"></iframe>
  </section>

  <section id="request">
    <iframe src="SubTabs/Request.html"></iframe>
  </section>

  <section id="contact">
    <iframe src="SubTabs/Contact.html"></iframe>
  </section>

  <section id="admin" style="display:none;">
    <iframe src="SubTabs/Admin.html"></iframe>
  </section>

</div>

<footer>&copy; 2026 AllProGamerz</footer>


<script src="/scripts/verifySession.js"></script>
<script>

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('token');
  window.location.href = 'login.html';
});

</script>

</body>
</html>

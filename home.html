<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllProGamerz — Dashboard</title>
  <link rel="icon" href="photo.png">
  <link rel="stylesheet" href="styles/dashboard.css">
  <style>
    table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 12px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    th { color: var(--text-muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
    .prompt-cell { max-width: 300px; white-space: pre-wrap; }
  </style>
</head>
<body>

<header>
  <h1>AP<span>G</span></h1>
  <button class="btn btn-danger" id="logoutBtn">Sign out</button>
</header>

<div class="nav-bar">
  <a href="Games.html">Games</a>
  <a href="#challenge">Challenge</a>
  <a href="#prize">Prizes</a>
  <a href="#profile">Profile</a>
  <a href="#request">Request</a>
  <a href="#contact">Contact</a>
  <a href="#adminPanel" id="adminNavLink" style="display:none;">Admin</a>
</div>

<div id="mainWorkspace" class="container" style="display: none;">

  <section id="games">
    <h2>Games</h2>
    <a href="Games.html" class="btn btn-primary">Browse games</a>
  </section>

  <section id="challenge">
    <h2>Weekly challenge</h2>
    <div class="form-group">
      <label for="challengeText">Describe your proof</label>
      <textarea id="challengeText" rows="3"></textarea>
    </div>
    <button class="btn btn-primary" id="challengeBtn">Submit</button>
    <p class="status" id="challengeStatus"></p>
  </section>

  <section id="prize">
    <h2>Prize alerts</h2>
    <p style="color: var(--text-muted); font-size: 14px; margin: 0;">Winners get free custom websites.</p>
  </section>

  <section id="profile">
    <h2>Profile</h2>
    <button class="btn btn-ghost" id="viewProfileBtn">View profile</button>
    <div id="profileSection">
      <p id="profileInfo">Loading...</p>
      <a class="btn btn-ghost" href="https://whatsapp.com" target="_blank" style="margin-top: 12px;">Invite friends</a>
      <div id="editProfile">
        <h3>Edit profile</h3>
        <div class="form-group">
          <label>First name</label>
          <input type="text" id="editFirstName" placeholder="First name">
        </div>
        <div class="form-group">
          <label>Last name</label>
          <input type="text" id="editLastName" placeholder="Last name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="editEmail" disabled>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="editPhone" placeholder="Phone">
        </div>
        <button class="btn btn-primary" id="saveProfileBtn">Save</button>
        <p class="status" id="editStatus"></p>
      </div>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
        <button class="btn btn-ghost" id="showAdminClaimBtn" style="font-size:12px;color:var(--text-muted);">Get admin</button>
        <div id="adminClaimSection" style="display:none;margin-top:12px;">
          <div class="form-group">
            <label>Admin password</label>
            <input type="password" id="adminPassInput" placeholder="Enter password">
          </div>
          <button class="btn btn-primary" id="claimAdminBtn">Claim admin</button>
          <p class="status" id="adminClaimStatus"></p>
        </div>
      </div>
    </div>
  </section>

  <section id="request">
    <h2>Request a custom website</h2>
    <div class="form-group">
      <label for="Prompt">Describe what you want</label>
      <textarea id="Prompt" rows="4" placeholder="Layout, theme, pages..."></textarea>
    </div>
    <button class="btn btn-primary" id="Btn">Submit</button>
    <p class="status" id="Status"></p>
    <div id="requestsList" style="margin-top:16px;"></div>
  </section>

  <section id="adminPanel" style="display:none;">
    <h2>Admin</h2>
    <div id="adminStats" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;"></div>
    <div style="margin-bottom:16px;">
      <button class="btn btn-ghost" onclick="showAdminTab('stats')">Stats</button>
      <button class="btn btn-ghost" onclick="showAdminTab('users')">Users</button>
      <button class="btn btn-ghost" onclick="showAdminTab('requests')">Requests</button>
      <button class="btn btn-ghost" onclick="showAdminTab('danger')" style="color:var(--danger);">Danger</button>
    </div>
    <div id="adminStatsTab"></div>
    <div id="adminUsersTab" style="display:none;"></div>
    <div id="adminRequestsTab" style="display:none;"></div>
    <div id="adminDangerTab" style="display:none;"></div>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <a class="btn btn-ghost" href="https://wa.me" target="_blank">WhatsApp</a>
  </section>

</div>

<footer>&copy; 2026 AllProGamerz</footer>

<script>
const token = sessionStorage.getItem('token');
if (!token) { window.location.href = 'login.html'; }

let authenticatedUser = null;

function verifySession() {
  fetch('https://apg-api.vercel.app/api/check-session', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      if (data && data.status === 'authenticated') {
        authenticatedUser = data.user;
        document.getElementById('mainWorkspace').style.display = 'block';
        if (data.user.is_admin) {
          document.getElementById('adminNavLink').style.display = '';
          document.getElementById('adminPanel').style.display = '';
          loadAdminStats();
          loadAdminRequests();
          loadAdminUsers();
        }
      }
    })
    .catch(() => { window.location.href = 'login.html'; });
}

verifySession();

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('token');
  window.location.href = 'login.html';
});

function populateProfileUI() {
  if (!authenticatedUser) { document.getElementById('profileInfo').innerText = 'Session lost.'; return; }
  document.getElementById('profileInfo').innerHTML =
    'Email: ' + authenticatedUser.email + '<br>' +
    'Verified: ' + (authenticatedUser.verified ? 'yes' : 'no');
  document.getElementById('editEmail').value = authenticatedUser.email;
}

document.getElementById('viewProfileBtn').addEventListener('click', () => {
  const box = document.getElementById('profileSection');
  if (box.style.display === 'block') {
    box.style.display = 'none';
    document.getElementById('viewProfileBtn').innerText = 'View profile';
  } else {
    populateProfileUI();
    box.style.display = 'block';
    document.getElementById('viewProfileBtn').innerText = 'Hide profile';
  }
});

document.getElementById('showAdminClaimBtn').addEventListener('click', () => {
  const box = document.getElementById('adminClaimSection');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('claimAdminBtn').addEventListener('click', () => {
  const password = document.getElementById('adminPassInput').value;
  const s = document.getElementById('adminClaimStatus');
  if (!password) { s.innerText = 'Enter password.'; return; }
  s.innerText = 'Checking...';
  fetch('https://apg-api.vercel.app/api/claim-admin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ password })
  })
  .then(r => r.json())
  .then(d => {
    s.innerText = d.message;
    if (d.status === 'success') { setTimeout(() => location.reload(), 1000); }
  })
  .catch(() => { s.innerText = 'Network error.'; });
});

document.getElementById('saveProfileBtn').addEventListener('click', () => {
  const fn = document.getElementById('editFirstName').value.trim();
  const ln = document.getElementById('editLastName').value.trim();
  const ph = document.getElementById('editPhone').value.trim();
  const s = document.getElementById('editStatus');
  if (!fn || !ln || !ph) { s.innerText = 'Fill all fields.'; return; }
  s.innerText = 'Saved.';
});

document.getElementById('Btn').addEventListener('click', () => {
  const prompt = document.getElementById('Prompt').value.trim();
  const s = document.getElementById('Status');
  if (!prompt) { s.innerText = 'Write something.'; return; }
  fetch('https://apg-api.vercel.app/api/requests', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ prompt })
  })
  .then(r => r.json())
  .then(d => {
    s.innerText = d.message;
    document.getElementById('Prompt').value = '';
    loadMyRequests();
  })
  .catch(() => { s.innerText = 'Network error.'; });
});

document.getElementById('challengeBtn').addEventListener('click', () => {
  const text = document.getElementById('challengeText').value.trim();
  const s = document.getElementById('challengeStatus');
  if (!authenticatedUser) { s.innerText = 'Not logged in.'; return; }
  if (!text) { s.innerText = 'Write something.'; return; }
  window.open('https://wa.me?text=' + encodeURIComponent(authenticatedUser.email + '\n\n' + text), '_blank');
  s.innerText = 'Opened WhatsApp.';
});

function loadMyRequests() {
  fetch('https://apg-api.vercel.app/api/requests', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
    .then(r => r.json())
    .then(data => {
      const wrap = document.getElementById('requestsList');
      if (!data.length) { wrap.innerHTML = ''; return; }
      let html = '<h3 style="font-size:13px;color:var(--text-muted);margin:0 0 8px;">Your requests</h3>';
      html += '<table><thead><tr><th>Date</th><th>Prompt</th><th>Status</th></tr></thead><tbody>';
      data.forEach(r => {
        html += '<tr><td>' + new Date(r.created_at).toLocaleString() + '</td><td class="prompt-cell">' + r.prompt + '</td><td>' + r.status + '</td></tr>';
      });
      html += '</tbody></table>';
      wrap.innerHTML = html;
    });
}

let adminCurrentTab = 'stats';

function showAdminTab(tab) {
  adminCurrentTab = tab;
  ['adminStatsTab','adminUsersTab','adminRequestsTab','adminDangerTab'].forEach(id => {
    document.getElementById(id).style.display = id === 'admin' + tab.charAt(0).toUpperCase() + tab.slice(1) + 'Tab' ? 'block' : 'none';
  });
}

function loadAdminStats() {
  fetch('https://apg-api.vercel.app/api/admin/stats', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
    .then(r => r.json())
    .then(d => {
      const wrap = document.getElementById('adminStats');
      wrap.innerHTML = '';
      const cards = [
        { label: 'Total users', value: d.total_users },
        { label: 'Verified', value: d.verified_users },
        { label: 'Admins', value: d.admin_users },
        { label: 'Requests', value: d.total_requests },
        { label: 'Pending', value: d.pending_requests },
      ];
      cards.forEach(c => {
        wrap.innerHTML += '<div style="background:var(--surface);padding:12px 18px;border-radius:8px;min-width:100px;"><div style="font-size:22px;font-weight:700;">' + c.value + '</div><div style="font-size:12px;color:var(--text-muted);">' + c.label + '</div></div>';
      });
      document.getElementById('adminStatsTab').innerHTML = '';
    });
}

function loadAdminUsers() {
  fetch('https://apg-api.vercel.app/api/admin/users', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
    .then(r => r.json())
    .then(data => {
      const wrap = document.getElementById('adminUsersTab');
      if (!data.length) { wrap.innerHTML = '<p style="color:var(--text-muted);">No users.</p>'; return; }
      let html = '<table><thead><tr><th>Email</th><th>Verified</th><th>Admin</th></tr></thead><tbody>';
      data.forEach(u => {
        html += '<tr><td>' + u.email + '</td><td>' + (u.verified ? 'yes' : 'no') + '</td><td>' + (u.is_admin ? 'yes' : 'no') + '</td></tr>';
      });
      html += '</tbody></table>';
      wrap.innerHTML = html;
    });
}

function loadAdminRequests() {
  fetch('https://apg-api.vercel.app/api/admin/requests', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
    .then(r => r.json())
    .then(data => {
      const wrap = document.getElementById('adminRequestsTab');
      if (!data.length) { wrap.innerHTML = '<p style="color:var(--text-muted);font-size:14px;">No requests yet.</p>'; return; }
      let html = '<table><thead><tr><th>Date</th><th>Email</th><th>Prompt</th><th>Status</th><th>Action</th></tr></thead><tbody>';
      data.forEach(r => {
        html += '<tr><td>' + new Date(r.created_at).toLocaleString() + '</td><td>' + r.email + '</td><td class="prompt-cell">' + r.prompt + '</td><td>' + r.status + '</td>' +
          '<td>' +
          (r.status === 'pending' ? '<button class="btn btn-ghost" onclick="adminAccept(' + r.id + ')">Accept</button> ' : '') +
          (r.status === 'pending' ? '<button class="btn btn-ghost" onclick="adminReject(' + r.id + ')">Reject</button> ' : '') +
          '<button class="btn btn-ghost" onclick="adminDeleteReq(' + r.id + ')" style="color:var(--danger);">Delete</button>' +
          '</td></tr>';
      });
      html += '</tbody></table>';
      wrap.innerHTML = html;
    });
}

function adminAccept(id) {
  fetch('https://apg-api.vercel.app/api/admin/requests/' + id + '/status', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ status: 'accepted' })
  })
  .then(r => r.json())
  .then(d => { alert(d.message); loadAdminRequests(); });
}

function adminReject(id) {
  fetch('https://apg-api.vercel.app/api/admin/requests/' + id + '/status', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ status: 'rejected' })
  })
  .then(r => r.json())
  .then(d => { alert(d.message); loadAdminRequests(); });
}

function adminDeleteReq(id) {
  if (!confirm('Delete this request?')) return;
  fetch('https://apg-api.vercel.app/api/admin/requests/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(r => r.json())
  .then(d => { alert(d.message); loadAdminRequests(); });
}

document.addEventListener('DOMContentLoaded', () => {
  const wrap = document.getElementById('adminDangerTab');
  wrap.innerHTML = '<h3 style="color:var(--danger);">Danger zone</h3>' +
    '<button class="btn btn-danger" onclick="adminCleanup()">Delete everything (users + requests)</button>' +
    '<p class="status" id="cleanupStatus"></p>';
});

function adminCleanup() {
  if (!confirm('ARE YOU SURE? This deletes ALL users and ALL requests!')) return;
  if (!confirm('Last chance — this cannot be undone!')) return;
  const s = document.getElementById('cleanupStatus');
  s.innerText = 'Deleting...';
  fetch('https://apg-api.vercel.app/api/admin/cleanup', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(r => r.json())
  .then(d => {
    s.innerText = d.message;
    if (d.status === 'success') setTimeout(() => location.reload(), 1500);
  });
}

loadMyRequests();
</script>

</body>
</html>

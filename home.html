<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllProGamerz — Dashboard</title>
  <link rel="icon" href="photo.png">
  <link rel="stylesheet" href="styles/dashboard.css">
</head>
<body>

  <header>
    <h1>AP<span>G</span></h1>
    <p id="greeting" style="font-size:14px;color:var(--text-muted);font-weight:400;"></p>
    <button class="btn btn-danger" id="logoutBtn">Sign out</button>
  </header>

  <nav class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="games">Games</button>
    <button class="tab" data-tab="challenge">Challenge</button>
    <button class="tab" data-tab="prizes">Prizes</button>
    <button class="tab" data-tab="profile">Profile</button>
    <button class="tab" data-tab="request">Request</button>
    <button class="tab" data-tab="contact">Contact</button>
    <button class="tab" data-tab="admin" id="adminTab" style="display:none;">Admin</button>
  </nav>

  <main id="mainWorkspace" class="container" style="display:none;">

    <div id="nameReminder" style="display:none;background:rgba(234,179,8,0.12);border:1px solid rgba(234,179,8,0.3);border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:14px;color:#eab308;">
      Don't forget to add your <strong>First Name</strong> and <strong>Last Name</strong> in your <button class="tab-link" data-tab="profile" style="color:#eab308;font-weight:600;background:none;border:none;cursor:pointer;text-decoration:underline;">profile</button>!
    </div>

    <div class="tab-panel active" id="panel-games"></div>
    <div class="tab-panel" id="panel-challenge"></div>
    <div class="tab-panel" id="panel-prizes"></div>
    <div class="tab-panel" id="panel-profile"></div>
    <div class="tab-panel" id="panel-request"></div>
    <div class="tab-panel" id="panel-contact"></div>
    <div class="tab-panel" id="panel-admin"></div>

  </main>

  <footer>&copy; 2026 AllProGamerz</footer>

  <script>
    const TOKEN = sessionStorage.getItem('token');
    if (!TOKEN) { location.href = 'login.html'; throw 'no session'; }

    const tabConfig = {
      games:     'SubTabs/Games.html',
      challenge: 'SubTabs/Challenge.html',
      prizes:    'SubTabs/Prizes.html',
      profile:   'SubTabs/Profile.html',
      request:   'SubTabs/Request.html',
      contact:   'SubTabs/Contact.html',
      admin:     'SubTabs/Admin.html'
    };

    const loaded = {};
    let currentTab = null;

    function switchTab(name) {
      if (name === currentTab) return;

      const oldPanel = currentTab ? document.getElementById('panel-' + currentTab) : null;
      const newPanel = document.getElementById('panel-' + name);

      document.querySelectorAll('.tab').forEach(t =>
        t.classList.toggle('active', t.dataset.tab === name)
      );

      if (oldPanel) {
        oldPanel.classList.add('exiting');
        oldPanel.addEventListener('animationend', () => {
          oldPanel.classList.remove('active', 'exiting');
        }, { once: true });
      }

      newPanel.classList.add('active');

      if (!loaded[name] && tabConfig[name]) {
        const iframe = document.createElement('iframe');
        iframe.src = tabConfig[name];
        newPanel.appendChild(iframe);
        loaded[name] = true;
      }

      currentTab = name;
      history.replaceState(null, '', '#' + name);
    }

    document.getElementById('tabBar').addEventListener('click', e => {
      const btn = e.target.closest('.tab');
      if (btn) switchTab(btn.dataset.tab);
    });

    document.querySelectorAll('.tab-link').forEach(link => {
      link.addEventListener('click', () => switchTab(link.dataset.tab));
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('token');
      location.href = 'login.html';
    });

    fetch('https://apg-api.vercel.app/api/me', {
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    })
      .then(r => r.json())
      .then(data => {
        if (data.status !== 'success') {
          sessionStorage.removeItem('token');
          location.href = 'login.html';
          return;
        }
        const user = data.user;
        window.authenticatedUser = user;

        document.getElementById('greeting').innerText = 'Hello ' + (user.firstName || '') + '!';
        document.getElementById('mainWorkspace').style.display = '';

        if (!user.firstName || !user.lastName) {
          document.getElementById('nameReminder').style.display = '';
        }
        if (user.admin) {
          document.getElementById('adminTab').style.display = '';
        }

        const hash = location.hash.slice(1);
        switchTab(hash && tabConfig[hash] ? hash : 'games');
      })
      .catch(() => {
        sessionStorage.removeItem('token');
        location.href = 'login.html';
      });
  </script>

</body>
</html>
